<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Phish-Blocker — Live Screening</title>
<style>
  :root {
    --bg: #070a10;
    --bg2: #0b0f17;
    --panel: #0e131d;
    --panel2: #121826;
    --border: #1d2636;
    --border2: #2a3548;
    --text: #e6e9f0;
    --muted: #74809a;
    --green: #2ee6a0;
    --amber: #f1c40f;
    --orange: #ff8c42;
    --red: #ff4d5e;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(46,230,160,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,77,94,.06), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    overflow: hidden;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
    background-size: 38px 38px;
  }

  /* ---------- header ---------- */
  header {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--bg2), transparent);
  }
  .brand { display: flex; align-items: center; gap: 11px; }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--green), #1a9e6e);
    display: grid; place-items: center;
    box-shadow: 0 0 18px rgba(46,230,160,.4);
  }
  .brand .logo svg { width: 18px; height: 18px; }
  .brand h1 {
    font-size: 15px; margin: 0; letter-spacing: .14em; font-weight: 700;
    text-transform: uppercase;
  }
  .brand .tag {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    letter-spacing: .22em; text-transform: uppercase;
  }
  .header-status {
    margin-left: auto; display: flex; align-items: center; gap: 9px;
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted);
    padding: 7px 13px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--panel);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.live { background: var(--green); box-shadow: 0 0 10px var(--green); animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 50% { opacity: .35; } }

  /* ---------- layout ---------- */
  main {
    position: relative; z-index: 1;
    display: grid; grid-template-columns: 1fr 400px;
    gap: 16px; padding: 16px; min-height: 0;
  }
  .panel {
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--border); border-radius: 14px;
    padding: 18px; min-height: 0; display: flex; flex-direction: column;
  }
  .panel-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: .2em;
    text-transform: uppercase; color: var(--muted); margin: 0 0 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title::before {
    content: ""; width: 4px; height: 13px; border-radius: 2px;
    background: var(--green); box-shadow: 0 0 8px var(--green);
  }

  /* ---------- transcript ---------- */
  #transcript { overflow-y: auto; flex: 1; padding-right: 6px; }
  #transcript::-webkit-scrollbar { width: 8px; }
  #transcript::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .turn { margin: 12px 0; display: flex; flex-direction: column; animation: slidein .28s ease; }
  .turn.agent { align-items: flex-end; }
  @keyframes slidein { from { opacity: 0; transform: translateY(6px); } }
  .turn .who {
    font-family: var(--mono); font-size: 10px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .turn .who .ts { opacity: .55; }
  .bubble {
    max-width: 80%; padding: 10px 14px; border-radius: 12px;
    line-height: 1.45; font-size: 14px; border: 1px solid transparent;
  }
  .turn.caller .bubble { background: #16202f; border-color: #223046; border-bottom-left-radius: 4px; }
  .turn.agent .bubble { background: #122a26; border-color: #1d4a40; border-bottom-right-radius: 4px; }

  /* ---------- analysis column ---------- */
  .analysis { display: flex; flex-direction: column; gap: 16px; min-height: 0; }

  /* gauge */
  .gauge-panel { align-items: center; flex-shrink: 0; }
  .gauge-wrap { position: relative; width: 220px; height: 220px; margin: 4px auto 6px; }
  .gauge-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: #182234; stroke-width: 14; }
  .ring-prog {
    fill: none; stroke: var(--green); stroke-width: 14; stroke-linecap: round;
    transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1), stroke .5s;
    filter: drop-shadow(0 0 6px currentColor);
  }
  .gauge-center {
    position: absolute; inset: 0; display: grid; place-items: center; text-align: center;
  }
  .gauge-num { font-size: 56px; font-weight: 800; line-height: 1; transition: color .5s; font-variant-numeric: tabular-nums; }
  .gauge-pct { font-size: 20px; font-weight: 600; opacity: .7; }
  .gauge-sub { font-family: var(--mono); font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  .risk-pill {
    margin: 2px auto 4px; padding: 8px 18px; border-radius: 999px;
    font-family: var(--mono); font-weight: 700; font-size: 14px;
    letter-spacing: .18em; text-transform: uppercase;
    border: 1px solid var(--border2); color: var(--muted);
    transition: all .4s;
  }
  .risk-pill[data-level="LOW"]      { color: var(--green);  border-color: rgba(46,230,160,.5);  background: rgba(46,230,160,.08); }
  .risk-pill[data-level="ELEVATED"] { color: var(--amber);  border-color: rgba(241,196,15,.5);  background: rgba(241,196,15,.08); }
  .risk-pill[data-level="HIGH"]     { color: var(--orange); border-color: rgba(255,140,66,.5);  background: rgba(255,140,66,.1); }
  .risk-pill[data-level="CRITICAL"] { color: var(--red);    border-color: rgba(255,77,94,.6);   background: rgba(255,77,94,.12); }

  .gauge-panel.alert { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,77,94,0); border-color: var(--border); }
    50%     { box-shadow: 0 0 26px 2px rgba(255,77,94,.28); border-color: rgba(255,77,94,.55); }
  }

  /* signals */
  .signals-panel { flex: 1 1 auto; min-height: 120px; }
  #chips { flex: 1; min-height: 0; overflow-y: auto; padding-right: 4px; }
  #chips::-webkit-scrollbar { width: 8px; }
  #chips::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .empty { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; opacity: .7; }
  .sig {
    border: 1px solid var(--border2); border-left: 3px solid var(--red);
    background: linear-gradient(90deg, rgba(255,77,94,.07), rgba(255,77,94,0) 70%);
    border-radius: 10px; padding: 11px 13px; margin-bottom: 9px; animation: slidein .3s ease;
  }
  .sig-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .sig-label { font-weight: 700; font-size: 13.5px; }
  .sig-conf { font-family: var(--mono); font-size: 12px; color: var(--red); font-weight: 700; white-space: nowrap; }
  .sig-bar { height: 4px; border-radius: 3px; background: #1c2333; margin: 8px 0 7px; overflow: hidden; }
  .sig-bar > div { height: 100%; background: var(--red); width: 0; transition: width .5s; }
  .sig-expl { font-size: 11.5px; line-height: 1.4; color: #c7cedd; opacity: .9; }

  /* verdict */
  .verdict {
    flex-shrink: 0;
    padding: 18px; border-radius: 14px; text-align: center; font-weight: 800;
    font-size: 24px; letter-spacing: .14em; text-transform: uppercase;
    background: var(--panel2); border: 1px solid var(--border); color: var(--muted);
    transition: all .4s;
  }
  .verdict.pass      { background: rgba(46,230,160,.1);  color: var(--green); border-color: rgba(46,230,160,.5); box-shadow: 0 0 24px rgba(46,230,160,.15); }
  .verdict.challenge { background: rgba(241,196,15,.1);  color: var(--amber); border-color: rgba(241,196,15,.5); box-shadow: 0 0 24px rgba(241,196,15,.12); }
  .verdict.block     { background: rgba(255,77,94,.12);  color: var(--red);   border-color: rgba(255,77,94,.6);  box-shadow: 0 0 30px rgba(255,77,94,.2); }
  .verdict .reason { font-weight: 400; font-size: 13px; margin-top: 8px; color: var(--text); opacity: .82; letter-spacing: .02em; text-transform: none; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#06120c" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z"/>
        </svg>
      </span>
      <div>
        <h1>Phish-Blocker</h1>
        <div class="tag">Live Call Screening</div>
      </div>
    </div>
    <div class="header-status">
      <span class="dot" id="dot"></span><span id="status">Standby — waiting for call</span>
    </div>
  </header>

  <main>
    <div class="panel">
      <div class="panel-title">Live Transcript</div>
      <div id="transcript"></div>
    </div>

    <div class="analysis">
      <div class="panel gauge-panel" id="gaugePanel">
        <div class="panel-title">Threat Level</div>
        <div class="gauge-wrap">
          <svg viewBox="0 0 200 200">
            <circle class="ring-track" cx="100" cy="100" r="85"></circle>
            <circle class="ring-prog" id="ring" cx="100" cy="100" r="85"></circle>
          </svg>
          <div class="gauge-center">
            <div>
              <span class="gauge-num" id="gauge">0</span><span class="gauge-pct">%</span>
              <div class="gauge-sub">Scam Score</div>
            </div>
          </div>
        </div>
        <div class="risk-pill" id="risk" data-level="LOW">Low Risk</div>
      </div>

      <div class="panel signals-panel">
        <div class="panel-title">Matched Scam Tactics</div>
        <div id="chips"><div class="empty">No tactics matched yet.</div></div>
      </div>

      <div class="verdict" id="verdict">Screening…</div>
    </div>
  </main>

<script>
  const $ = (id) => document.getElementById(id);
  const R = 85, C = 2 * Math.PI * R;
  $("ring").style.strokeDasharray = C;
  $("ring").style.strokeDashoffset = C;

  function levelFor(s) {
    if (s >= 0.75) return { name: "CRITICAL", label: "Critical Risk", color: "var(--red)" };
    if (s >= 0.5)  return { name: "HIGH",     label: "High Risk",     color: "var(--orange)" };
    if (s >= 0.25) return { name: "ELEVATED", label: "Elevated Risk", color: "var(--amber)" };
    return { name: "LOW", label: "Low Risk", color: "var(--green)" };
  }

  function setScore(s) {
    s = Math.max(0, Math.min(1, s));
    const pct = Math.round(s * 100);
    const lv = levelFor(s);
    $("gauge").textContent = pct;
    $("gauge").style.color = lv.color;
    $("ring").style.stroke = lv.color;
    $("ring").style.strokeDashoffset = C * (1 - s);
    const pill = $("risk");
    pill.dataset.level = lv.name;
    pill.textContent = lv.label;
    $("gaugePanel").classList.toggle("alert", lv.name === "CRITICAL");
  }

  function addTurn(role, text) {
    const ts = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    const div = document.createElement("div");
    div.className = "turn " + role;
    div.innerHTML = `<div class="who">${role === "agent" ? "Screener" : "Caller"} · <span class="ts"></span></div><div class="bubble"></div>`;
    div.querySelector(".ts").textContent = ts;
    div.querySelector(".bubble").textContent = text;
    $("transcript").appendChild(div);
    $("transcript").scrollTop = $("transcript").scrollHeight;
  }

  function addChip(label, conf, explanation) {
    const empty = $("chips").querySelector(".empty");
    if (empty) empty.remove();
    const pct = Math.round((conf || 0) * 100);
    const sig = document.createElement("div");
    sig.className = "sig";
    sig.innerHTML =
      `<div class="sig-head"><span class="sig-label"></span><span class="sig-conf">${pct}%</span></div>` +
      `<div class="sig-bar"><div></div></div>` +
      (explanation ? `<div class="sig-expl"></div>` : "");
    sig.querySelector(".sig-label").textContent = label;
    if (explanation) sig.querySelector(".sig-expl").textContent = explanation;
    $("chips").appendChild(sig);
    requestAnimationFrame(() => { sig.querySelector(".sig-bar > div").style.width = pct + "%"; });
  }

  function setVerdict(rec, reason) {
    const v = $("verdict");
    v.className = "verdict " + (rec || "");
    v.innerHTML = (rec ? rec.toUpperCase() : "SCREENING…") + (reason ? `<div class="reason">${reason}</div>` : "");
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onmessage = (m) => {
      const e = JSON.parse(m.data);
      if (e.type === "call_start") {
        $("dot").classList.add("live");
        $("status").textContent = "Call in progress";
        $("transcript").innerHTML = "";
        $("chips").innerHTML = '<div class="empty">No tactics matched yet.</div>';
        setScore(0);
        setVerdict("", "");
        $("verdict").textContent = "SCREENING…";
      } else if (e.type === "transcript") {
        addTurn(e.role, e.text);
      } else if (e.type === "signal") {
        addChip(e.label, e.confidence, e.explanation);
        if (typeof e.scam_score === "number") setScore(e.scam_score);
      } else if (e.type === "verdict") {
        if (typeof e.scam_score === "number") setScore(e.scam_score);
        setVerdict(e.recommendation, e.reason);
      } else if (e.type === "transfer") {
        const v = $("verdict");
        if (e.status === "initiated") {
          v.className = "verdict pass";
          v.innerHTML = "TRANSFERRING…" + (e.to ? `<div class="reason">→ ${e.to}</div>` : "");
        } else if (e.status === "connected") {
          v.className = "verdict pass";
          v.innerHTML = "CONNECTED" + (e.to ? `<div class="reason">Caller bridged to ${e.to}</div>` : "");
        } else if (e.status === "failed") {
          v.innerHTML = "TRANSFER FAILED" + (e.error ? `<div class="reason">${e.error}</div>` : "");
        }
      }
    };
    ws.onclose = () => {
      $("dot").classList.remove("live");
      $("status").textContent = "Disconnected — reconnecting…";
      setTimeout(connect, 1000);
    };
  }
  connect();
</script>
</body>
</html>
