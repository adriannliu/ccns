<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Phish-Blocker — Live Screening</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #141925;
    --border: #232a3a;
    --text: #e6e9f0;
    --muted: #8a93a6;
    --green: #2ecc71;
    --amber: #f1c40f;
    --red: #e74c3c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    display: grid; grid-template-columns: 1fr 360px;
    gap: 16px; padding: 16px; height: 100vh;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  #transcript { overflow-y: auto; height: calc(100vh - 32px); }
  .turn { margin: 10px 0; line-height: 1.4; }
  .turn .who { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .turn.caller .bubble { background: #1d2433; }
  .turn.agent .bubble { background: #14233a; }
  .bubble { display: inline-block; padding: 8px 12px; border-radius: 10px; margin-top: 3px; }
  .gauge-wrap { text-align: center; margin: 8px 0 18px; }
  .gauge { font-size: 52px; font-weight: 700; transition: color .3s; }
  .gauge-label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
  .bar { height: 10px; border-radius: 6px; background: #1d2433; overflow: hidden; margin-top: 8px; }
  .bar > div { height: 100%; width: 0%; background: var(--green); transition: width .4s, background .4s; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .chip {
    font-size: 12px; padding: 5px 9px; border-radius: 999px;
    background: #2a1c1c; color: var(--red); border: 1px solid #44282822;
    animation: pop .25s ease; cursor: default; max-width: 100%;
  }
  .chip .chip-detail {
    display: block; font-size: 10px; color: #c9a0a0; margin-top: 2px;
    font-weight: 400; line-height: 1.3;
  }
  @keyframes pop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .verdict { margin-top: 18px; padding: 14px; border-radius: 10px; text-align: center; font-weight: 700; font-size: 20px; letter-spacing: .04em; background: #1d2433; color: var(--muted); }
  .verdict.pass { background: #143020; color: var(--green); }
  .verdict.challenge { background: #2e2a12; color: var(--amber); }
  .verdict.block { background: #2e1414; color: var(--red); }
  .verdict .reason { font-weight: 400; font-size: 13px; margin-top: 6px; color: var(--text); opacity: .85; }
  .status { font-size: 12px; color: var(--muted); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); margin-right: 6px; }
  .dot.live { background: var(--green); }
</style>
</head>
<body>
  <div class="panel" style="display:flex;flex-direction:column;">
    <h1>Live Call Transcript</h1>
    <div class="sub"><span class="dot" id="dot"></span><span id="status">waiting for call…</span></div>
    <div id="transcript"></div>
  </div>

  <div class="panel">
    <h1>Threat Analysis</h1>
    <div class="gauge-wrap">
      <div class="gauge" id="gauge">0</div>
      <div class="gauge-label">Scam Score</div>
      <div class="bar"><div id="bar"></div></div>
    </div>
    <div class="gauge-label">Detected Signals</div>
    <div class="chips" id="chips"></div>
    <div class="verdict" id="verdict">SCREENING…</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const colorFor = (s) => s >= 0.66 ? "var(--red)" : s >= 0.33 ? "var(--amber)" : "var(--green)";

  function setScore(s) {
    const pct = Math.round(s * 100);
    $("gauge").textContent = pct;
    $("gauge").style.color = colorFor(s);
    $("bar").style.width = pct + "%";
    $("bar").style.background = colorFor(s);
  }

  function addTurn(role, text) {
    const div = document.createElement("div");
    div.className = "turn " + role;
    div.innerHTML = `<div class="who">${role}</div><div class="bubble"></div>`;
    div.querySelector(".bubble").textContent = text;
    $("transcript").appendChild(div);
    $("transcript").scrollTop = $("transcript").scrollHeight;
  }

  function addChip(label, conf, explanation) {
    const c = document.createElement("div");
    c.className = "chip";
    const head = document.createElement("span");
    head.textContent = `${label} ${Math.round(conf * 100)}%`;
    c.appendChild(head);
    if (explanation) {
      const detail = document.createElement("span");
      detail.className = "chip-detail";
      detail.textContent = explanation.length > 120 ? explanation.slice(0, 117) + "…" : explanation;
      c.appendChild(detail);
    }
    $("chips").appendChild(c);
  }

  function setVerdict(rec, reason) {
    const v = $("verdict");
    v.className = "verdict " + rec;
    v.innerHTML = rec.toUpperCase() + (reason ? `<div class="reason">${reason}</div>` : "");
  }

  function connect() {
    const proto = location.protocol === "https:" ? "wss" : "ws";
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onmessage = (m) => {
      const e = JSON.parse(m.data);
      if (e.type === "call_start") {
        $("dot").classList.add("live");
        $("status").textContent = "call in progress";
        $("transcript").innerHTML = "";
        $("chips").innerHTML = "";
        setScore(0);
        setVerdict("", "");
        $("verdict").textContent = "SCREENING…";
      } else if (e.type === "transcript") {
        addTurn(e.role, e.text);
      } else if (e.type === "signal") {
        addChip(e.label, e.confidence, e.explanation);
        if (typeof e.scam_score === "number") setScore(e.scam_score);
      } else if (e.type === "verdict") {
        if (typeof e.scam_score === "number") setScore(e.scam_score);
        setVerdict(e.recommendation, e.reason);
      }
    };
    ws.onclose = () => setTimeout(connect, 1000);
  }
  connect();
</script>
</body>
</html>
